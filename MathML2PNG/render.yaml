services:
  - type: web
    name: mathml2png
    runtime: python
    buildCommand: pip install -r requirements.txt && npm install
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mathml-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: NODE_VERSION
        value: 18.17.0

databases:
  - name: mathml-db
    databaseName: mathml
    user: mathml_user
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Register – MathML Forge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f3ee;--surface:#fff;--surface2:#f9f8f4;--border:#d8d4c8;--accent:#1a6b3c;--accent2:#1e5fa8;--text:#1c1b18;--muted:#7a7468}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse 70% 50% at 90% 10%,rgba(30,95,168,.07),transparent),radial-gradient(ellipse 60% 50% at 10% 90%,rgba(26,107,60,.06),transparent)}
.wrap{width:100%;max-width:420px;padding:20px}
.brand{text-align:center;margin-bottom:36px}
.logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-1.5px;color:var(--accent)}
.logo span{color:var(--accent2)}
.sub{color:var(--muted);font-size:.75rem;margin-top:5px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;box-shadow:0 2px 16px rgba(0,0,0,.07)}
.card-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:10px}
.icon-wrap{width:30px;height:30px;border-radius:7px;background:rgba(30,95,168,.1);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.form-group{margin-bottom:16px}
label{font-size:.7rem;color:var(--muted);display:block;margin-bottom:6px;letter-spacing:.6px;text-transform:uppercase;font-weight:500}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;padding:11px 13px;outline:none;transition:.15s}
input:focus{border-color:rgba(30,95,168,.5);box-shadow:0 0 0 3px rgba(30,95,168,.08)}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:var(--accent2);color:#fff;font-family:'DM Mono',monospace;font-size:.87rem;font-weight:500;cursor:pointer;transition:.15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:7px}
.btn:hover{opacity:.87;transform:translateY(-1px)}
.divider{text-align:center;color:var(--muted);font-size:.72rem;margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}
.footer-link{text-align:center;font-size:.8rem;color:var(--muted)}
.footer-link a{color:var(--accent);text-decoration:none}
.footer-link a:hover{text-decoration:underline}
.flash{padding:10px 14px;border-radius:7px;font-size:.78rem;margin-bottom:14px;border:1px solid}
.flash.danger{background:#fdf0ee;border-color:#f0b8b2;color:#b03a2e}
.flash.success{background:#edfaf3;border-color:#a7dfbf;color:#1a6b3c}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">Math<span>ML</span> Forge</div>
    <div class="sub">Create your account</div>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}
  {% endwith %}
  <div class="card">
    <div class="card-title"><div class="icon-wrap">✨</div>Create Account</div>
    <form method="POST">
      <div class="form-group"><label>Username</label><input type="text" name="username" placeholder="choose a username" required/></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="at least 8 characters" required/></div>
      <button class="btn" type="submit">Create Account →</button>
    </form>
    <div class="divider">or</div>
    <div class="footer-link">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></div>
  </div>
</div>
</body>
</html>
